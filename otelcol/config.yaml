receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  
  # Scrape del propio collector
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 10s
          static_configs:
            - targets: ['0.0.0.0:8888']

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
  
  memory_limiter:
    check_interval: 1s
    limit_percentage: 70
    spike_limit_percentage: 30
  
  # Separación de métricas de negocio (las que empiezan con 'business.')
  filter/business:
    metrics:
      include:
        match_type: regexp
        metric_names:
          - '^business\..*'
  
  # Métricas técnicas (se excluyen las de negocio)
  filter/technical:
    metrics:
      exclude:
        match_type: regexp
        metric_names:
          - '^business\..*'

  # Enriquecimiento genérico de atributos
  resource/env:
    attributes:
      - key: deployment.environment
        value: "production"
        action: insert

exporters:
  # Exportar métricas a Prometheus
  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
    tls:
      insecure: true

  # Exportar logs a Loki
  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"

  # Exportar trazas a Tempo
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Debug visual
  logging:
    verbosity: detailed

extensions:
  health_check:
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/env, batch]
      exporters: [otlp/tempo, logging]
    
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resource/env, batch]
      exporters: [prometheusremotewrite, logging]
      
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/env, batch]
      exporters: [loki, logging]