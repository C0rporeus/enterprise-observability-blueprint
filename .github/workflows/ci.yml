name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-configs:
    name: Validate Configs & Dashboards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML syntax (infra configs)
        run: |
          echo "Validating YAML config files..."
          failed=0
          for f in deploy/docker-compose/*.yaml deploy/docker-compose/*.yml otelcol/*.yaml; do
            if [ -f "$f" ]; then
              if python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
                echo "  OK: $f"
              else
                echo "  FAIL: $f"
                failed=1
              fi
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more YAML config files are invalid"
            exit 1
          fi

      - name: Validate OpenTelemetry Collector config
        run: |
          docker run --rm -v ${{ github.workspace }}/otelcol:/etc/otelcol otel/opentelemetry-collector-contrib:0.96.0 validate --config=/etc/otelcol/config.yaml

      - name: Validate Grafana dashboard JSON syntax
        run: |
          echo "Validating Grafana dashboard JSON files..."
          failed=0
          for f in grafana/dashboards/*.json; do
            if jq empty "$f" 2>/dev/null; then
              echo "  OK: $f"
            else
              echo "  FAIL: $f"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more dashboard JSON files are invalid"
            exit 1
          fi

      - name: Validate datasource UIDs match provisioned config
        run: |
          echo "Checking datasource UID references..."
          provisioned=$(grep -oP 'uid:\s*\K\S+' grafana/provisioning/datasources/datasources.yaml | sort -u)
          for f in grafana/dashboards/*.json; do
            dashboard_uids=$(jq -r '.. | objects | select(.uid? and .type?) | .uid' "$f" 2>/dev/null | grep -v grafana | sort -u)
            for uid in $dashboard_uids; do
              if ! echo "$provisioned" | grep -qx "$uid"; then
                echo "::warning::Dashboard $(basename $f) references datasource UID '$uid' not found in provisioned datasources"
              fi
            done
          done

  go-service-ci:
    name: Go Service Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./instrumentation/go-service
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: go mod download
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ./instrumentation/go-service
      - name: Run Build
        run: go build -v ./...
      - name: Run Tests
        run: go test -v ./...

  rust-service-ci:
    name: Rust Service Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./instrumentation/rust-service
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Run clippy
        run: cargo clippy -- -D warnings
      - name: Build
        run: cargo build --verbose

  smoke-test:
    name: Stack Smoke Test
    runs-on: ubuntu-latest
    needs: [validate-configs, go-service-ci, rust-service-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Build and start stack
        run: docker compose -f deploy/docker-compose/docker-compose.yaml up -d --build
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for all services to become healthy..."
          for i in $(seq 1 24); do
            healthy=$(docker compose -f deploy/docker-compose/docker-compose.yaml ps | grep -c "(healthy)" || true)
            total=$(docker compose -f deploy/docker-compose/docker-compose.yaml ps --services | wc -l)
            echo "  Attempt $i: $healthy/$total healthy"
            if [ "$healthy" -ge 5 ]; then
              echo "All services healthy!"
              break
            fi
            if [ "$i" -eq 24 ]; then
              echo "::error::Timeout waiting for services to become healthy"
              docker compose -f deploy/docker-compose/docker-compose.yaml ps
              exit 1
            fi
            sleep 5
          done
      - name: Verify endpoints respond
        run: |
          echo "Checking service endpoints..."
          curl -sf http://localhost:3000/api/health > /dev/null && echo "  Grafana: OK" || echo "  Grafana: FAIL"
          curl -sf http://localhost:9090/-/healthy > /dev/null && echo "  Prometheus: OK" || echo "  Prometheus: FAIL"
          curl -sf http://localhost:3100/ready > /dev/null && echo "  Loki: OK" || echo "  Loki: FAIL"
          curl -sf http://localhost:3200/ready > /dev/null && echo "  Tempo: OK" || echo "  Tempo: FAIL"
          curl -sf http://localhost:8080/order > /dev/null && echo "  Go Service: OK" || echo "  Go Service: FAIL"
          curl -sf http://localhost:8081/order > /dev/null && echo "  Rust Service: OK" || echo "  Rust Service: FAIL"
      - name: Verify OTel Collector receives data
        run: |
          echo "Waiting 15s for telemetry data to flow..."
          sleep 15
          response=$(curl -sf 'http://localhost:9090/api/v1/query?query=otelcol_receiver_accepted_spans_total')
          if echo "$response" | grep -q '"result":\[{'; then
            echo "  OTel Collector metrics in Prometheus: OK"
          else
            echo "  OTel Collector metrics in Prometheus: FAIL (no data yet)"
          fi
      - name: Tear down stack
        if: always()
        run: docker compose -f deploy/docker-compose/docker-compose.yaml down -v
